<!-- PAGE: Dashboard -->
<div class="page active" id="page-dashboard">
  <div class="page-header">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle" id="dash-date"></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadDashboard()">
      <svg width="14" height="14"><use href="images/icons.svg#icon-refresh"/></svg>Refresh
    </button>
  </div>
  <div class="stats-row" id="dash-stats"></div>
  <div class="dash-grid">
    <div class="card"><div class="card-title">Recent Requests</div><div id="dash-recent-reqs"></div></div>
    <div class="card"><div class="card-title">Today's PMS Progress</div><div id="dash-pms-summary"></div></div>
  </div>
  <div class="dash-grid">
    <div class="card"><div class="card-title">Equipment Running Hours</div><div id="dash-hours-chart" style="margin-top:8px"></div></div>
    <div class="card"><div class="card-title">Requests by Priority</div><div id="dash-priority-chart" style="margin-top:8px"></div></div>
  </div>
</div>
